name: Deploy to Hostinger (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: https://mapajugar.figprojects.com
          paypal_url: ${{ secrets.PAYPAL_URL }}
        run: npm run build

      # Hostinger shared hosting: SFTP en puerto 65002 (no FTP/FTPS 21).
      - name: Sync files to Hostinger
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          local_path: "./out/*"
          remote_path: ${{ secrets.FTP_TARGET_DIR_PRD }}
          sftp_only: true
