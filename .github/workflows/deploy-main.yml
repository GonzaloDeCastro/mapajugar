name: Deploy to Hostinger (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: https://mapajugar.figprojects.com
          paypal_url: ${{ secrets.PAYPAL_URL }}
        run: npm run build

      - name: Prepare FTP target directory
        env:
          FTP_TARGET_DIR_PRD: ${{ secrets.FTP_TARGET_DIR_PRD }}
        run: |
          DIR="$(printf '%s' "$FTP_TARGET_DIR_PRD" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's|^/||' | sed 's|/*$||')"
          if [ -z "$DIR" ]; then
            echo "::error::FTP_TARGET_DIR_PRD está vacío. Ejemplo: public_html/mapajugar"
            exit 1
          fi
          DIR="$DIR/"
          echo "FTP_TARGET_DIR=$DIR" >> "$GITHUB_ENV"
          echo "Deploy target: $DIR"

      # FTP plano (sin SSL) + modo pasivo.
      # FTP_SERVER: IP 147.93.37.124 o hostname de hPanel (FTP Accounts).
      # FTP_TARGET_DIR_PRD: public_html/mapajugar (sin barra inicial)
      - name: Sync files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ env.FTP_TARGET_DIR }}
          local-dir: ./out/
          protocol: ftp
          port: 21
