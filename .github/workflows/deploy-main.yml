name: Deploy to Hostinger (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: https://mapajugar.figprojects.com
          paypal_url: ${{ secrets.PAYPAL_URL }}
        run: npm run build

      - name: Normalize FTP target directory
        id: ftp-target
        env:
          FTP_TARGET_DIR_PRD: ${{ secrets.FTP_TARGET_DIR_PRD }}
        run: |
          DIR="${FTP_TARGET_DIR_PRD%/}/"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      # FTP plano (sin SSL) + modo pasivo. FTPS/SFTP suelen hacer timeout desde GitHub Actions.
      # FTP_SERVER: hostname de hPanel (FTP Accounts) o IP 147.93.37.124 — NO uses ftp.figprojects.com (no existe en DNS).
      - name: Sync files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ steps.ftp-target.outputs.dir }}
          local-dir: ./out/
          protocol: ftp
          port: 21
