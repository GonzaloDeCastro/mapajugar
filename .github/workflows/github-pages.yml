# Publica en GitHub Pages vía Actions.
# Una sola vez: Settings → Pages → Source → GitHub Actions.
#
# Sitio de proyecto: https://usuario.github.io/nombre-repo/
# Sitio de usuario: repo usuario.github.io → sin subruta

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Configurar URL y base path
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER}.github.io/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=$REPO" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_SITE_URL=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.PAYPAL_URL }}" ]; then
            echo "paypal_url=${{ secrets.PAYPAL_URL }}" >> "$GITHUB_ENV"
          fi

      - run: npm ci

      - name: Build static site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
